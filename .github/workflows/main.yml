#maestro: github actions
#a cada push na branch main, um robo aciona uma VM para executar estes comandos
#workflow customizado para segurança

name: DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Instalar dependências de teste
        run: |
          pip install flake8 bandit
        
      - name: Rodar Linter (Flake8)
        run: flake8 ./app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Rodar Análise de segurança (Bandit)
        run: bandit -r ./app -f txt


  build-and-push:
    needs: security-and-testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código 
      uses: actions/checkout@v3

    - name: Configurando credenciais AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login no ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build das imagens
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cp ./dependencias/requirements.txt ./app/requirements.txt

        docker build --no-cache -t $ECR_REGISTRY/gunicorn-app-flask:latest -f ./docker/dockerfile.gunicorn ./app
        docker build --no-cache -t $ECR_REGISTRY/nginx-app-flask:latest -f ./docker/dockerfile.nginx ./docker
        docker build --no-cache -t $ECR_REGISTRY/netdata:latest -f ./docker/dockerfile.netdata .
    
    - name: Rodar Trivy (Flask)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ steps.login-ecr.outputs.registry }}/gunicorn-app-flask:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Rodar Trivy (Nginx)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ steps.login-ecr.outputs.registry }}/nginx-app-flask:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Push das imagens para ECR 
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker push $ECR_REGISTRY/gunicorn-app-flask:latest
        docker push $ECR_REGISTRY/nginx-app-flask:latest
        docker push $ECR_REGISTRY/netdata:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Configurar Chave SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          known_hosts: 'placeholder' 

      - name: Adicionar host conhecido
        run: |
          ssh-keyscan -H -v ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Instalar Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Rodar Ansible de Deploy
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "[servidor]" > inventory.ini
          echo "$SERVER_HOST ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
          # Chamando especificamente o arquivo de deploy
          ansible-playbook -i inventory.ini ansible/deploy.yml